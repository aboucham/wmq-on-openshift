---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wmqdata
  labels:
    app: wmq
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mq-passwords
  labels:
    app: wmq
type: Opaque
stringData:
  MQ_ADMIN_PASSWORD: "password"
  MQ_APP_PASSWORD: "password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mq-setup-script
  labels:
    app: wmq
data:
  setup.mqsc: |
    * ------------------------------------------------
    * 1. IDENTITY ADOPTION (The Docs Fix)
    * ------------------------------------------------
    * ADOPTCTX(YES) ensures MQ adopts the 'app' ID for all subsequent authorization
    ALTER AUTHINFO(SYSTEM.DEFAULT.AUTHINFO.IDPWOS) AUTHTYPE(IDPWOS) ADOPTCTX(YES)
    * RELAX OS CHECK: Allow 'app' identity even if not in /etc/passwd
    ALTER AUTHINFO(DEV.AUTHINFO) AUTHTYPE(IDPWOS) CHCKCLNT(OPTIONAL) CHCKLOCL(OPTIONAL)
    REFRESH SECURITY TYPE(CONNAUTH)

    * ------------------------------------------------
    * 2. OBJECT DEFINITIONS
    * ------------------------------------------------
    DEFINE QLOCAL('IN.QUEUE') REPLACE
    DEFINE CHANNEL('ONEFINSURV.SVRCONN') CHLTYPE(SVRCONN) TRPTYPE(TCP) REPLACE
    * Map the channel to the 'app' internal identity
    ALTER CHANNEL('ONEFINSURV.SVRCONN') CHLTYPE(SVRCONN) MCAUSER('app')

    * ------------------------------------------------
    * 3. CHANNEL AUTHENTICATION (REPLACE prevents startup errors)
    * ------------------------------------------------
    SET CHLAUTH('ONEFINSURV.SVRCONN') TYPE(ADDRESSMAP) ADDRESS('*') USERSRC(CHANNEL) ACTION(REPLACE)

    * ------------------------------------------------
    * 4. EXPLICIT AUTHORIZATIONS (Principal must be 'app')
    * ------------------------------------------------
    SET AUTHREC PROFILE('IN.QUEUE') OBJTYPE(QUEUE) PRINCIPAL('app') AUTHADD(ALL)
    SET AUTHREC PROFILE('QMGR') OBJTYPE(QMGR) PRINCIPAL('app') AUTHADD(ALL)
    REFRESH SECURITY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wmq
  labels:
    app: wmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wmq
  template:
    metadata:
      labels:
        app: wmq
    spec:
      initContainers:
      - name: fix-permissions
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["sh", "-c", "chown -R 1001:0 /mnt/mqm && chmod -R 775 /mnt/mqm"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
      containers:
      - name: mq
        image: icr.io/ibm-messaging/mq:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: LICENSE
          value: "accept"
        - name: MQ_DEV
          value: "true"
        - name: MQ_QMGR_NAME
          value: "QMGR"
        - name: MQ_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mq-passwords
              key: MQ_ADMIN_PASSWORD
        ports:
        - containerPort: 1414
          name: mq-port
        - containerPort: 9443
          name: mq-console
        readinessProbe:
          exec:
            command: ["chkmqready"]
          initialDelaySeconds: 20
          periodSeconds: 5
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
        - name: mqsc-scripts
          mountPath: /etc/mqm/setup.mqsc
          subPath: setup.mqsc
      volumes:
      - name: mq-data
        persistentVolumeClaim:
          claimName: wmqdata
      - name: mqsc-scripts
        configMap:
          name: mq-setup-script
---
apiVersion: v1
kind: Service
metadata:
  name: wmq-service
  labels:
    app: wmq
spec:
  selector:
    app: wmq
  ports:
  - name: qm-port
    port: 1414
    targetPort: 1414
  - name: console-port
    port: 9443
    targetPort: 9443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mq-web-console
  labels:
    app: wmq
spec:
  to:
    kind: Service
    name: wmq-service
  port:
    targetPort: console-port
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
