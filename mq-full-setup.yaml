---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wmqdata
  labels:
    app: wmq
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mq-passwords
  labels:
    app: wmq
type: Opaque
stringData:
  # The Connector uses these, but MQ will map them to the internal 'mqm' user
  MQ_ADMIN_PASSWORD: "password"
  MQ_APP_PASSWORD: "password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-source-mqsc
  labels:
    app: wmq
data:
  source.mqsc: |
    * 1. RELAX SECURITY (Allows 'alice' to pass the initial gate)
    ALTER AUTHINFO(SYSTEM.DEFAULT.AUTHINFO.IDPWOS) AUTHTYPE(IDPWOS) ADOPTCTX(YES) CHCKCLNT(OPTIONAL)
    REFRESH SECURITY TYPE(CONNAUTH)

    * 2. OBJECT DEFINITIONS
    DEFINE QLOCAL('MYQSOURCE') REPLACE
    DEFINE CHANNEL('MYSVRCONN') CHLTYPE(SVRCONN) TRPTYPE(TCP) REPLACE

    * 3. IDENTITY MAPPING (The Final Fix)
    * This maps 'alice' to the OS-resident 'mqm' user (UID 1001)
    SET CHLAUTH('MYSVRCONN') TYPE(BLOCKUSER) USERLIST('nobody') ACTION(REPLACE)
    SET CHLAUTH('*') TYPE(ADDRESSMAP) ADDRESS('*') USERSRC(NOACCESS) ACTION(REPLACE)
    SET CHLAUTH('MYSVRCONN') TYPE(ADDRESSMAP) ADDRESS('*') USERSRC(MAP) MCAUSER('mqm') CHCKCLNT(REQUIRED) ACTION(REPLACE)

    * 4. AUTHORIZATIONS
    * We authorize the adopted user 'mqm' to do the work
    SET AUTHREC OBJTYPE(QMGR) PRINCIPAL('mqm') AUTHADD(CONNECT,INQ,DSP)
    SET AUTHREC PROFILE('MYQSOURCE') OBJTYPE(QUEUE) PRINCIPAL('mqm') AUTHADD(ALL)
    
    REFRESH SECURITY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wmq
  labels:
    app: wmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wmq
  template:
    metadata:
      labels:
        app: wmq
    spec:
      initContainers:
      - name: fix-permissions
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["sh", "-c", "chown -R 1001:0 /mnt/mqm && chmod -R 775 /mnt/mqm"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
      containers:
      - name: mq
        image: icr.io/ibm-messaging/mq:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: LICENSE
          value: "accept"
        - name: MQ_DEV
          value: "true"
        - name: MQ_QMGR_NAME
          value: "QM1"
        - name: MQ_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mq-passwords
              key: MQ_ADMIN_PASSWORD
        ports:
        - containerPort: 1414
          name: mq-port
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
        - name: mqsc-scripts
          mountPath: /etc/mqm/source.mqsc
          subPath: source.mqsc
      volumes:
      - name: mq-data
        persistentVolumeClaim:
          claimName: wmqdata
      - name: mqsc-scripts
        configMap:
          name: custom-source-mqsc
---
apiVersion: v1
kind: Service
metadata:
  name: wmq-service
spec:
  selector:
    app: wmq
  ports:
  - name: qm-port
    port: 1414
    targetPort: 1414
