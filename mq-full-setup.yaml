---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wmqdata
  labels:
    app: wmq
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-source-mqsc
  labels:
    app: wmq
data:
  # This script disables all security gates for a seamless connection
  source.mqsc: |
    * 1. DISABLE CONNECTION AUTH (Stop checking OS passwords)
    ALTER AUTHINFO(SYSTEM.DEFAULT.AUTHINFO.IDPWOS) AUTHTYPE(IDPWOS) CHCKCLNT(NONE)
    ALTER AUTHINFO(DEV.AUTHINFO) AUTHTYPE(IDPWOS) CHCKCLNT(NONE)
    REFRESH SECURITY TYPE(CONNAUTH)

    * 2. DISABLE CHANNEL AUTH (Stop checking IP/Client IDs)
    ALTER QMGR CHLAUTH(DISABLED)

    * 3. OBJECT DEFINITIONS
    DEFINE QLOCAL('MYQSOURCE') REPLACE
    DEFINE CHANNEL('MYSVRCONN') CHLTYPE(SVRCONN) TRPTYPE(TCP) REPLACE
    * Map all incoming traffic on this channel to the admin user 'mqm'
    ALTER CHANNEL('MYSVRCONN') CHLTYPE(SVRCONN) MCAUSER('mqm')

    * 4. PERMISSIONS (Ensuring 'mqm' has full authority)
    SET AUTHREC OBJTYPE(QMGR) PRINCIPAL('mqm') AUTHADD(ALL)
    SET AUTHREC PROFILE('MYQSOURCE') OBJTYPE(QUEUE) PRINCIPAL('mqm') AUTHADD(ALL)
    
    REFRESH SECURITY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wmq
  labels:
    app: wmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wmq
  template:
    metadata:
      labels:
        app: wmq
    spec:
      initContainers:
      - name: fix-permissions
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["sh", "-c", "chown -R 1001:0 /mnt/mqm && chmod -R 775 /mnt/mqm"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
      containers:
      - name: mq
        image: icr.io/ibm-messaging/mq:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: LICENSE
          value: "accept"
        - name: MQ_DEV
          value: "true"
        - name: MQ_QMGR_NAME
          value: "QM1"
        # Since we disabled auth, this is only used for the Web Console
        - name: MQ_ADMIN_PASSWORD
          value: "password"
        ports:
        - containerPort: 1414
          name: mq-port
        - containerPort: 9443
          name: mq-console
        readinessProbe:
          exec:
            command: ["chkmqready"]
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
        - name: mqsc-scripts
          mountPath: /etc/mqm/source.mqsc
          subPath: source.mqsc
      volumes:
      - name: mq-data
        persistentVolumeClaim:
          claimName: wmqdata
      - name: mqsc-scripts
        configMap:
          name: custom-source-mqsc
---
apiVersion: v1
kind: Service
metadata:
  name: wmq-service
spec:
  selector:
    app: wmq
  ports:
  - name: qm-port
    port: 1414
    targetPort: 1414
  - name: console-port
    port: 9443        # The SSL port for the web console
    targetPort: 9443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mq-web-console
spec:
  to:
    kind: Service
    name: wmq-service
  port:
    targetPort: console-port
  tls:
    # Use 'passthrough' because the MQ container handles its own SSL
    termination: passthrough 
    insecureEdgeTerminationPolicy: Redirect
