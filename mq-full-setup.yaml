---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wmqdata
  labels:
    app: wmq
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mq-passwords
  labels:
    app: wmq
type: Opaque
stringData:
  MQ_ADMIN_PASSWORD: "password"
  MQ_APP_PASSWORD: "password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mq-setup-script
  labels:
    app: wmq
data:
  setup.mqsc: |
    * ------------------------------------------------
    * 1. SECURITY & IDENTITY ADOPTION (IBM DOCS STYLE)
    * ------------------------------------------------
    * Use ADOPTCTX(YES) so MQ uses the 'alice' ID for all authorization
    ALTER AUTHINFO(SYSTEM.DEFAULT.AUTHINFO.IDPWOS) AUTHTYPE(IDPWOS) ADOPTCTX(YES)
    * RELAX OS CHECK: Required for OpenShift since 'alice' isn't in /etc/passwd
    ALTER AUTHINFO(DEV.AUTHINFO) AUTHTYPE(IDPWOS) CHCKCLNT(OPTIONAL) CHCKLOCL(OPTIONAL)
    REFRESH SECURITY TYPE(CONNAUTH)

    * ------------------------------------------------
    * 2. CHANNEL & QUEUE DEFINITIONS
    * ------------------------------------------------
    DEFINE QLOCAL('MYQSOURCE') REPLACE
    DEFINE CHANNEL('MYSVRCONN') CHLTYPE(SVRCONN) TRPTYPE(TCP) REPLACE

    * ------------------------------------------------
    * 3. CHANNEL AUTHENTICATION (CHLAUTH)
    * ------------------------------------------------
    SET CHLAUTH('MYSVRCONN') TYPE(BLOCKUSER) USERLIST('nobody')
    SET CHLAUTH('*') TYPE(ADDRESSMAP) ADDRESS('*') USERSRC(NOACCESS)
    SET CHLAUTH('MYSVRCONN') TYPE(ADDRESSMAP) ADDRESS('*') USERSRC(CHANNEL) CHCKCLNT(REQUIRED)
    * Ensure the channel adopts 'alice' as the internal identity
    ALTER CHANNEL('MYSVRCONN') CHLTYPE(SVRCONN) MCAUSER('alice')

    * ------------------------------------------------
    * 4. AUTHORIZATIONS (AUTHREC)
    * ------------------------------------------------
    * Authorize 'alice' to connect and inquire the Queue Manager
    SET AUTHREC OBJTYPE(QMGR) PRINCIPAL('alice') AUTHADD(CONNECT,INQ)
    * Authorize 'alice' with ALLMQI for the source queue
    SET AUTHREC PROFILE('MYQSOURCE') OBJTYPE(QUEUE) PRINCIPAL('alice') AUTHADD(ALLMQI)
    
    REFRESH SECURITY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wmq
  labels:
    app: wmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wmq
  template:
    metadata:
      labels:
        app: wmq
    spec:
      initContainers:
      - name: fix-permissions
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["sh", "-c", "chown -R 1001:0 /mnt/mqm && chmod -R 775 /mnt/mqm"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
      containers:
      - name: mq
        image: icr.io/ibm-messaging/mq:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: LICENSE
          value: "accept"
        - name: MQ_DEV
          value: "true"
        - name: MQ_QMGR_NAME
          value: "QMGR"
        - name: MQ_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mq-passwords
              key: MQ_ADMIN_PASSWORD
        ports:
        - containerPort: 1414
          name: mq-port
        - containerPort: 9443
          name: mq-console
        readinessProbe:
          exec:
            command: ["chkmqready"]
          initialDelaySeconds: 20
          periodSeconds: 5
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
        - name: mqsc-scripts
          mountPath: /etc/mqm/setup.mqsc
          subPath: setup.mqsc
      volumes:
      - name: mq-data
        persistentVolumeClaim:
          claimName: wmqdata
      - name: mqsc-scripts
        configMap:
          name: mq-setup-script
---
apiVersion: v1
kind: Service
metadata:
  name: wmq-service
spec:
  selector:
    app: wmq
  ports:
  - name: qm-port
    port: 1414
    targetPort: 1414
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mq-web-console
spec:
  to:
    kind: Service
    name: wmq-service
  port:
    targetPort: qm-port
  tls:
    termination: edge
