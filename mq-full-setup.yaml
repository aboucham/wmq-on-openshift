---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wmqdata
  labels:
    app: wmq
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mq-passwords
  labels:
    app: wmq
type: Opaque
stringData:
  MQ_ADMIN_PASSWORD: "quick123+"
  MQ_APP_PASSWORD: "quick123+"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wmq
  labels:
    app: wmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wmq
  template:
    metadata:
      labels:
        app: wmq
    spec:
      initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: ["sh", "-c", "chown -R 1001:0 /mnt/mqm && chmod -R 775 /mnt/mqm"]
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
      containers:
      - name: mq
        image: icr.io/ibm-messaging/mq:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: LICENSE
          value: "accept"
        - name: MQ_DEV
          value: "true"
        - name: MQ_QMGR_NAME
          value: "QMGR"
        - name: MQ_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mq-passwords
              key: MQ_ADMIN_PASSWORD
        - name: MQ_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mq-passwords
              key: MQ_APP_PASSWORD
        ports:
        - containerPort: 1414
          name: mq-port
        - containerPort: 9443
          name: mq-console
        readinessProbe:
          exec:
            command: ["chkmqready"]
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
      volumes:
      - name: mq-data
        persistentVolumeClaim:
          claimName: wmqdata
---
apiVersion: v1
kind: Service
metadata:
  name: wmq-service
  labels:
    app: wmq
spec:
  selector:
    app: wmq
  ports:
  - name: qm-port
    port: 1414
    targetPort: 1414
  - name: console-port
    port: 9443
    targetPort: 9443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mq-web-console
  labels:
    app: wmq
spec:
  to:
    kind: Service
    name: wmq-service
  port:
    targetPort: console-port
  tls:
    termination: passthrough
